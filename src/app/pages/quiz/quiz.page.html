<ion-header>
  <ion-toolbar color="primary">
    <ion-title>🧠 Quiz</ion-title>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <!-- SOAL -->
  <div *ngIf="!showResult">
    <h2>{{ questions[currentIndex].question }}</h2>

    <ion-button
      expand="block"
      *ngFor="let opt of questions[currentIndex].options; let i = index"
      (click)="selectAnswer(i)"
    >
      {{ opt }}
    </ion-button>

    <p>Soal {{ currentIndex + 1 }} / {{ questions.length }}</p>
  </div>

  <!-- HASIL -->
  <div *ngIf="showResult">
    <h2>🎉 Quiz Selesai!</h2>
    <h3>Score kamu: {{ score }}</h3>

    <ion-button expand="block" (click)="restart()"> Ulangi Quiz </ion-button>
  </div>
</ion-content>
