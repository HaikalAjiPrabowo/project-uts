<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Detail Buku</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content *ngIf="book">
  <ion-card>
    <img src="https://via.placeholder.com/300" />

    <ion-card-header>
      <ion-card-title>{{ book.title }}</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <p>{{ book.description }}</p>

      <h2>📖 Materi</h2>
      <p style="white-space: pre-line;">{{ book.content }}</p>

      <ion-card class="code-card" *ngFor="let ex of book.examples">
        <ion-card-header>
          <ion-card-title>💻 {{ ex.label }}</ion-card-title>

          <ion-button class="copy-btn" (click)="copyCode(ex.code)">
            📋 Copy
          </ion-button>
        </ion-card-header>

        <ion-card-content>
          <pre class="code-text">{{ ex.code }}</pre>
        </ion-card-content>
      </ion-card>

    </ion-card-content>
  </ion-card>
</ion-content>
